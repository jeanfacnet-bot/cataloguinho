<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body.admin-has-sidebar .vitrine-container {
  max-width: none;
  margin-left: 270px;
  margin-right: 24px;
  padding: 0 16px;
}

.vitrine-container {
  max-width: none;
  margin: 30px 16px;
  padding: 0;
}

.vitrine-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.vitrine-item {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.2s;
}

.vitrine-item:hover {
  transform: scale(1.03);
}

.vitrine-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.vitrine-caption {
  padding: 10px;
  font-size: 13px;
  text-align: center;
}

.vitrine-title {
  font-weight: bold;
  margin-bottom: 4px;
  color: #111;
}

.vitrine-phone {
  color: #2563eb;
  margin-bottom: 4px;
}

.vitrine-address {
  color: #555;
  font-size: 12px;
}

/* TOPBAR IGUAL SEARCH */
.topbar {
  background: #111827;
  color: white;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.topbar .logo {
  font-size: 20px;
  font-weight: bold;
}

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.top-actions button {
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  background: #2563eb;
  color: white;
}

.top-actions .vip-btn {
  background: #f59e0b;
  color: white;
  font-weight: bold;
}

.top-actions button:hover {
  opacity: 0.9;
}

@media (max-width: 768px) {
  .vitrine-container {
    max-width: 100%;
    margin: 20px auto;
    padding: 0 16px;
  }

  .vitrine-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .vitrine-item {
    border-radius: 6px;
    box-shadow: none;
  }

  .vitrine-item:hover {
    transform: none;
  }

  .vitrine-item img {
    width: 100%;
    aspect-ratio: 1 / 1;
    height: auto;
    object-fit: cover;
    display: block;
  }

  .vitrine-caption {
    display: none;
  }
}
</style>

</head>

<body>

{% include "partials/topbar.html" %}
{% include "partials/admin_sidebar.html" %}

<div class="vitrine-container">
  <h2></h2>

  <div id="vitrineGrid" class="vitrine-grid"></div>
</div>

<script src="{{ url_for('static', filename='common_layout.js') }}?v=4"></script>
<script src="{{ url_for('static', filename='vitrine.js') }}"></script>

</body>
</html>
