<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body.admin-has-sidebar .vitrine-container {
  max-width: none;
  margin-left: 270px;
  margin-right: 24px;
  padding: 0 16px;
}

.vitrine-container {
  max-width: none;
  margin: 30px 16px;
  padding: 0;
}

.vitrine-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.vitrine-item {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.2s;
}

.vitrine-item:hover {
  transform: scale(1.03);
}

.vitrine-item img {
  width: 100%;
  height: 200px;
  object-fit: contain;
  display: block;
  background: #fff;
}

.vitrine-caption {
  padding: 10px;
  font-size: 13px;
  text-align: center;
}

.vitrine-title {
  font-weight: bold;
  margin-bottom: 4px;
  color: #111;
}

.vitrine-phone {
  color: #2563eb;
  margin-bottom: 4px;
}

.vitrine-address {
  color: #555;
  font-size: 12px;
}

/* TOPBAR IGUAL SEARCH */


@media (max-width: 768px) {
  body.admin-has-sidebar .vitrine-container,
  .vitrine-container {
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
    margin-top: 20px;
    margin-bottom: 20px;
    padding: 0 16px;
  }

  .vitrine-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .vitrine-item {
	  border-radius: 8px;
	  box-shadow: none;
	  overflow: hidden;
	}

	/* IMAGEM MENOR */
	.vitrine-item img {
	  width: 100%;
	  height: 120px; /* ↓ menor */
	  object-fit: contain;
	  display: block;
	  background: #fff;
	}

	/* LEGENDA MAIS COMPACTA */
	.vitrine-caption {
	  display: block;
	  padding: 6px; /* ↓ menos espaço */
	  font-size: 11px;
	  text-align: center;
	  line-height: 1.2;
	}

	/* TÍTULO MAIS COMPACTO */
	.vitrine-title {
	  font-weight: bold;
	  margin-bottom: 2px;
	  font-size: 11px;
	  line-height: 1.2;
	}

	/* TELEFONE */
	.vitrine-phone {
	  margin-bottom: 2px;
	  font-size: 10px;
	  line-height: 1.2;
	}

	/* ENDEREÇO */
	.vitrine-address {
	  font-size: 10px;
	  line-height: 1.2;
	}
}
</style>

</head>

<body>

{% include "partials/topbar.html" %}
{% include "partials/admin_sidebar.html" %}

<div class="vitrine-container">
  <h2></h2>

  <div id="vitrineGrid" class="vitrine-grid"></div>
</div>

<script src="{{ url_for('static', filename='common_layout.js') }}?v=4"></script>
<script src="{{ url_for('static', filename='vitrine.js') }}"></script>

</body>
</html>
