<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.page-wrap {
  min-height: calc(100vh - 80px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  background:
    radial-gradient(circle at top, rgba(16, 185, 129, 0.10), transparent 35%),
    linear-gradient(180deg, #f8fafc 0%, #ecfdf5 100%);
}

.reset-shell {
  width: 100%;
  max-width: 980px;
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  background: #ffffff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.reset-hero {
  background: linear-gradient(135deg, #059669 0%, #10b981 55%, #34d399 100%);
  color: white;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.reset-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.18);
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 18px;
}

.reset-hero h1 {
  font-size: 32px;
  margin-bottom: 16px;
}

.reset-hero p {
  font-size: 16px;
  line-height: 1.6;
  opacity: 0.95;
}

.reset-panel {
  padding: 42px 36px;
  display: flex;
  align-items: center;
}

.reset-card {
  width: 100%;
}

.reset-card h2 {
  font-size: 26px;
  margin-bottom: 8px;
  color: #0f172a;
}

.reset-subtitle {
  margin-bottom: 24px;
  color: #475569;
  font-size: 14px;
}

.auth-form {
  display: grid;
  gap: 14px;
}

.field-label {
  font-size: 13px;
  font-weight: 600;
  color: #334155;
}

.auth-form input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #cbd5e1;
  background: #f8fafc;
  font-size: 14px;
  transition: 0.2s;
}

.auth-form input:focus {
  outline: none;
  border-color: #10b981;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
}

.submit-btn {
  margin-top: 8px;
  border: none;
  border-radius: 12px;
  padding: 14px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.submit-btn:hover {
  transform: translateY(-1px);
}

.auth-message {
  margin-top: 12px;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  display: none;
}

.auth-message.success {
  display: block;
  background: #ecfdf5;
  color: #065f46;
}

.auth-message.error {
  display: block;
  background: #fef2f2;
  color: #b91c1c;
}

.password-rules {
  margin-top: 10px;
  font-size: 12px;
  color: #64748b;
}

.password-rules span {
  display: block;
}

.footer-links {
  margin-top: 18px;
  font-size: 14px;
}

.footer-links a {
  color: #059669;
  text-decoration: none;
  font-weight: 600;
}

.footer-links a:hover {
  text-decoration: underline;
}

@media (max-width: 900px) {
  .reset-shell {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

{% include "partials/topbar.html" %}

<main class="page-wrap">
  <section class="reset-shell">

    <!-- LADO ESQUERDO -->
    <div class="reset-hero">
      <div class="reset-badge">🔐 Segurança</div>

      <h1>Crie uma nova senha</h1>

      <p>
        Defina uma nova senha segura para sua conta. Após isso,
        você poderá acessar o sistema normalmente.
      </p>
    </div>

    <!-- LADO DIREITO -->
    <div class="reset-panel">
      <div class="reset-card">

        <h2>Nova senha</h2>
        <p class="reset-subtitle">
          Digite e confirme sua nova senha abaixo.
        </p>

        <form id="resetPasswordForm" class="auth-form">

          <label class="field-label">Nova senha</label>
          <input
            type="password"
            id="newPassword"
            placeholder="Digite a nova senha"
            required
          >

          <label class="field-label">Confirmar senha</label>
          <input
            type="password"
            id="confirmNewPassword"
            placeholder="Confirme a senha"
            required
          >

          <button type="submit" class="submit-btn">
            Salvar nova senha
          </button>
        </form>

        <div id="resetPasswordMessage" class="auth-message"></div>

        <div class="password-rules">
          <span>• Use pelo menos 6 caracteres</span>
          <span>• Evite senhas simples</span>
        </div>

        <div class="footer-links">
          <a href="/auth-page">Voltar para login</a>
        </div>

      </div>
    </div>

  </section>
</main>

<script src="{{ url_for('static', filename='auth.js') }}"></script>
<script src="{{ url_for('static', filename='common_layout.js') }}"></script>

</body>
</html>
